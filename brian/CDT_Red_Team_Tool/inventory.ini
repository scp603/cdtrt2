# inventory.ini

# Ansible inventory file that defines the Windows target host and all
# connection parameters required to reach it over WinRM through the
# CyberRange jump host.
#
#
# Usage:
#   This file is read automatically by Ansible when passed with -i:
#   ansible-playbook deploy.yml -i inventory.ini

# ── Host definition ───────────────────────────────────────────────────────────
# Defines a single host named target_windows inside the windows group.
# The windows group name is referenced in deploy.yml under hosts: target_windows
# and is used by Ansible to look up connection variables from [windows:vars].
# ansible_host is the actual IP address of the Windows 11 target on the
# OpenStack network. This value is replaced automatically by deploy.sh.
[windows]
target_windows ansible_host=10.10.10.21

# ── Connection variables ──────────────────────────────────────────────────────
# Variables defined here apply to every host in the windows group.
# These tell Ansible how to connect to and authenticate with Windows targets.
[windows:vars]

# The Windows user account Ansible authenticates as. This is the local
# account that exists on every OpenStack Windows instance in the CyberRange
# environment. This account must have Administrator privileges for the
# playbook tasks to succeed since they write to protected system directories.
ansible_user=cyberrange

# The password for the cyberrange account. Stored in plaintext here for
# simplicity during the CTF. In a production environment this would be
# stored in an Ansible Vault encrypted file instead.
ansible_password=Cyberrange123!

# Tells Ansible to use WinRM as the connection method instead of SSH.
# WinRM is Windows Remote Management, the native Windows protocol for
# remote command execution. It is the equivalent of SSH for Windows.
ansible_connection=winrm

# Sets the WinRM authentication method to basic which uses a plain
# username and password. The credentials are protected from interception
# by the HTTPS transport configured below.
ansible_winrm_transport=basic

# Tells Ansible to skip TLS certificate validation when connecting over
# WinRM HTTPS. This is required because the target uses a self-signed
# certificate generated by winrm_setup.ps1 which is not signed by a
# trusted certificate authority.
ansible_winrm_server_cert_validation=ignore

# The port WinRM HTTPS listens on. 5986 is the standard WinRM HTTPS port.
# This was opened on the Windows firewall by the setup one-liner and
# by winrm_setup.ps1 on subsequent runs.
ansible_port=5986

# Explicitly sets the connection scheme to HTTPS ensuring all WinRM
# traffic between Kali and the target is encrypted. Combined with
# ansible_winrm_transport=basic this means credentials are sent over
# an encrypted channel rather than in plaintext.
ansible_winrm_scheme=https

# Routes the WinRM connection through the CyberRange SSH jump host.
# The OpenStack network is not directly reachable from outside so all
# connections must be proxied through ssh.cyberrange.rit.edu first.
# ProxyJump tells SSH to connect to the jump host and tunnel traffic
# through it to reach the target. StrictHostKeyChecking=no prevents
# SSH from prompting to verify the jump host fingerprint which would
# block automated connections.
ansible_ssh_common_args=-o ProxyJump=sshjump@ssh.cyberrange.rit.edu -o StrictHostKeyChecking=no