<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reconboard — Login</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --bg: #0d1117; --bg2: #161b22; --bg3: #21262d; --border: #30363d; --text: #e6edf3; --muted: #8892a4; --red: #ff2b5e; --teal: #4ecdc4; --font: 'JetBrains Mono', monospace; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.login-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 40px; width: 380px; text-align: center; }
.logo-dot { width: 14px; height: 14px; border-radius: 50%; background: var(--red); box-shadow: 0 0 15px #ff2b5e88; display: inline-block; margin-bottom: 16px; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { box-shadow: 0 0 10px #ff2b5e88; } 50% { box-shadow: 0 0 25px #ff2b5ecc; } }
h1 { font-size: 20px; font-weight: 700; color: var(--red); letter-spacing: 2px; margin-bottom: 6px; }
.subtitle { font-size: 11px; color: var(--muted); margin-bottom: 28px; }
.input { width: 100%; padding: 12px 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--font); font-size: 14px; outline: none; text-align: center; letter-spacing: 2px; margin-bottom: 16px; }
.input:focus { border-color: var(--teal); }
.input::placeholder { letter-spacing: 0; }
.btn { width: 100%; padding: 12px; background: var(--teal); color: var(--bg); border: none; border-radius: 6px; font-family: var(--font); font-size: 13px; font-weight: 600; cursor: pointer; letter-spacing: 1px; }
.btn:hover { background: #5ee0d6; }
.error { color: var(--red); font-size: 12px; margin-bottom: 12px; }
.note { color: var(--muted); font-size: 10px; margin-top: 20px; line-height: 1.6; }
</style>
</head>
<body>
<div class="login-box">
  <div class="logo-dot"></div>
  <h1>RECONBOARD</h1>
  <div class="subtitle">Distributed Kali Reconnaissance</div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST" action="/login">
    <input class="input" type="password" name="password" placeholder="password" autofocus autocomplete="off">
    <button class="btn" type="submit">AUTHENTICATE</button>
  </form>
  <div class="note">Authorized operators only.<br>All access is logged.</div>
</div>
</body>
</html>
