[defaults]
inventory           = inventory.ini
remote_user         = cyberrange
host_key_checking   = False
timeout             = 15
forks               = 10
stdout_callback     = yaml
roles_path          = roles

[ssh_connection]
# Jump through the cyberrange bastion
ssh_args = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ProxyJump=sshjump@ssh.cyberrange.rit.edu
pipelining = True
