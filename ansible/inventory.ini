# ─── Target groups — fill IPs at comp time ───────────────────────────────────
# Run: ansible-playbook site.yml --tags disrupt -l linux
# Run: ansible-playbook site.yml --tags disrupt -l redis_hosts

[ftp]
svc-ftp-01   ansible_host=FILL_ME

[redis_hosts]
svc-redis-01     ansible_host=FILL_ME
svc-database-01  ansible_host=FILL_ME

[web]
svc-amazin-01  ansible_host=FILL_ME
svc-samba-01   ansible_host=FILL_ME

[dmz]
dmz-ftp-gw  ansible_host=FILL_ME

[internal]
internal-app-serv  ansible_host=FILL_ME
internal-db-serv   ansible_host=FILL_ME

# ─── All Linux targets ────────────────────────────────────────────────────────
[linux:children]
ftp
redis_hosts
web
dmz
internal

# ─── Windows targets ──────────────────────────────────────────────────────────
[windows]
svc-ad-01   ansible_host=FILL_ME ansible_connection=winrm ansible_winrm_transport=ntlm ansible_winrm_server_cert_validation=ignore
svc-smb-01  ansible_host=FILL_ME ansible_connection=winrm ansible_winrm_transport=ntlm ansible_winrm_server_cert_validation=ignore

[windows:vars]
ansible_user=Administrator
ansible_password=FILL_ME
ansible_port=5985
